services:
  nginx:
    image: nginx:alpine
    container_name: devops-lab-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/site:/usr/share/nginx/html:ro
    networks:
      - devops-net
    restart: unless-stopped

  portainer:
    image: portainer/portainer-ce:latest
    container_name: devops-lab-portainer
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./portainer/data:/data
    networks:
      - devops-net
    restart: unless-stopped

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: devops-lab-uptime-kuma
    ports:
      - "3001:3001"
    volumes:
      - ./uptime-kuma/data:/app/data
    networks:
      - devops-net
    restart: unless-stopped

networks:
  devops-net:
    driver: bridge
